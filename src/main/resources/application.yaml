spring:
  datasource:
    url: jdbc:mysql://localhost:3306/prediction_db
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  cache:
    type: simple

jwt:
  secret: mySuperSecretJwtKeyThatShouldBeVeryLongAndStoredSafely123456789
  expiration: 86400000

sportsdb:
  api-key: 123
  base-url: https://www.thesportsdb.com/api/v1/json