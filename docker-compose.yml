version: '3.8'

services:
  # Duomenų bazė
  db:
    image: mysql:8.4
    container_name: prediction_mysql
    restart: always
    environment:
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
      - MYSQL_DATABASE=prediction_db
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d

  # Tavo Java Backend (Platform)
  backend:
    build: ./platform
    container_name: prediction_backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/prediction_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=

  # Tavo Frontend
  frontend:
    build: ./frontend
    container_name: prediction_frontend
    ports:
      - "3000:3000" # Arba kitas portas, kurį naudoji
    depends_on:
      - backend